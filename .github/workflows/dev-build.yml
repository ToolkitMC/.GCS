name: Dev Build — Artifact

on:
  push:
    branches: [dev]

jobs:
  dev-zip:
    name: Build dev artifact
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Validate
        run: python3 .github/scripts/validate.py

      - name: Build ZIP
        run: |
          cd minecraft_datapack
          zip -r ../GCS_dev.zip . \
            --exclude "*.DS_Store" --exclude "__MACOSX/*"
          echo "Boyut: $(du -sh ../GCS_dev.zip | cut -f1)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GCS-dev-${{ github.sha }}
          path: GCS_dev.zip
          retention-days: 7
