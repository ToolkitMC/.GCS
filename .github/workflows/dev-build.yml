name: Dev Build — Artifact

on:
  push:
    branches: [dev]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  dev-zip:
    name: Build & upload dev artifact
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate
        run: python scripts/validate.py

      - name: Build ZIP
        run: |
          cd minecraft_datapack
          zip -r ../GCS_dev.zip . \
            --exclude "*.DS_Store" --exclude "__MACOSX/*"
          echo "Boyut: $(du -sh ../GCS_dev.zip | cut -f1)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GCS-dev-${{ github.sha }}
          path: GCS_dev.zip
          retention-days: 7
