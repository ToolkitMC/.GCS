name: CI — Lint & Validate

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, dev]

jobs:
  validate:
    name: Validate mcfunction & JSON
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Validate datapack
        run: python3 .github/scripts/validate.py

      - name: Validate all JSONs
        run: |
          find minecraft_datapack -name "*.json" | while read f; do
            python3 -c "import json,sys; json.load(open('$f'))" \
              || (echo "BROKEN: $f" && exit 1)
          done
