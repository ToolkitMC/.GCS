name: Release — Build ZIP

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Versiyon (örn: v2.1.2)"
        required: true

jobs:
  build:
    name: Build release ZIP
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set VERSION
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_ENV
          else
            echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_ENV
          fi

      - name: Validate (release blocker)
        run: python3 .github/scripts/validate.py

      - name: Build ZIP
        run: |
          cd minecraft_datapack
          zip -r ../GCS_${{ env.VERSION }}.zip . \
            --exclude "*.DS_Store" --exclude "__MACOSX/*"
          echo "Boyut: $(du -sh ../GCS_${{ env.VERSION }}.zip | cut -f1)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GCS-${{ env.VERSION }}
          path: GCS_${{ env.VERSION }}.zip
          retention-days: 90
